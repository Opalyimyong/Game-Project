<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Not Included</title>
  <link rel="stylesheet" href="mainmenu_Style.css" />
</head>
<body>
  <div class="menu-container">
    <h1>ENERGY <span class="NOT">NOT</span> INCLUDED</h1>

    <div class="menu-item">
      <label for="player-count">Players: <span id="player-val">3</span></label>
      <button onclick="decrementPlayers()">-</button>
      <button onclick="incrementPlayers()">+</button>
    </div>

    <div class="menu-item">
      <label for="map-select">Select Map</label>
      <select id="map-select"><option value="factory">The Rust Factory</option></select>
    </div>

    <div class="menu-item">
      <label for="difficulty">Difficulty</label>
      <select id="difficulty"><option value="easy">Beginner</option></select>
    </div>

    <button class="start-btn" onclick="startGame()">INITIALIZE MISSION</button>
    <p id="status" style="color:#bbb; min-height:1.2em;"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
