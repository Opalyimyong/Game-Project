<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Not Included - Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #1a1a24;
            overflow: hidden;
        }

        canvas {
            background-color: #242430;
            border: 4px solid #3a3a4a;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            cursor: crosshair;
        }

        #sidebar {
            width: 350px;
            background-color: #1e1e28;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            border-left: 1px solid #3e3e4f;
            box-sizing: border-box;
            overflow-y: auto;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: #00ffcc;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .player-status {
            background: #2a2a3a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .player-status.active {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .player-name {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .ap-display {
            font-size: 1rem;
            color: #ffeb3b;
        }

        h2 {
            font-size: 1.1rem;
            color: #aaaaaa;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .tool-option {
            background-color: #2a2a3a;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .tool-option:hover {
            background-color: #353545;
        }

        .tool-option:has(input:checked) {
            border-color: #00ffcc;
            background-color: #2a3a3a;
        }

        input[type="radio"] {
            margin-right: 12px;
            accent-color: #00ffcc;
            transform: scale(1.2);
            cursor: pointer;
        }

        label {
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            flex: 1;
        }

        .action-btn {
            margin-top: 15px;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .end-turn-btn { background: #ff0044; }
        .end-turn-btn:hover {
            background: #ff3366;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 0, 68, 0.5);
        }

        .dispose-waste-btn { background: #d35400; }
        .dispose-waste-btn:hover {
            background: #e67e22;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(230, 126, 34, 0.5);
        }

        #info-panel {
            margin-top: 20px;
            background-color: #15151c;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #cccccc;
            border-left: 3px solid #00ffcc;
        }
        
        #players-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Enlarged Canvas Real Estate Area -->
        <canvas id="gameCanvas" width="800" height="800"></canvas>
    </div>

    <div id="sidebar">
        <h1>Command Center</h1>
        
        <div id="players-container">
            <!-- Player Status generated dynamically -->
        </div>

        <div id="timer-display" style="text-align: center; font-size: 2rem; font-weight: bold; color: #ffeb3b; background: #2a2a3a; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #ffeb3b; text-shadow: 0 0 10px rgba(255, 235, 59, 0.5);">
            --:--
        </div>

        <h2>Actions (Cost: 1 AP)</h2>
        
        <div class="tool-option">
            <input type="radio" id="mode-resource" name="tool" value="resource" checked>
            <label for="mode-resource">Build Resource Plant ⛏️</label>
        </div>
        
        <div class="tool-option">
            <input type="radio" id="mode-power" name="tool" value="power">
            <label for="mode-power">Build Power Plant ⚡</label>
        </div>
        
        <div class="tool-option">
            <input type="radio" id="mode-link" name="tool" value="link">
            <label for="mode-link">Create Link 🔗</label>
        </div>
        
        <div class="tool-option">
            <input type="radio" id="mode-info" name="tool" value="info">
            <label for="mode-info">Inspect Node 🔍</label>
        </div>

        <button class="action-btn dispose-waste-btn" onclick="disposeWaste()">Dispose Waste 🛢️</button>
        <button class="action-btn end-turn-btn" onclick="endTurn()">END TURN</button>

        <div id="info-panel">
            <strong>Controls:</strong><br>
            • <strong>Left-Click:</strong> Perform Action.<br>
            • <strong>Right-Click & Drag:</strong> Pan Map.<br>
            • <strong>Link Tool:</strong> Click source node, then destination node.<br>
            <span id="game-message" style="color: #ffeb3b; display: block; margin-top: 10px;">Welcome to Energy Not Included!</span>
        </div>
    </div>

    <!-- Building Selection Modal -->
    <div id="building-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; flex-direction: column;">
        <div style="background: #1e1e28; padding: 30px; border-radius: 10px; border: 2px solid #00ffcc; text-align: center; width: 300px;">
            <h2 id="modal-title" style="color: #00ffcc; margin-top: 0;">Select Plant Type</h2>
            <select id="subtype-select" style="width: 100%; padding: 10px; margin: 15px 0; background: #2a2a3a; color: white; border: 1px solid #444; border-radius: 5px; font-size: 1rem;">
                <!-- Options populated by JS -->
            </select>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="confirmBuild()" style="padding: 10px 20px; background: #00ffcc; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">Build</button>
                <button onclick="cancelBuild()" style="padding: 10px 20px; background: #ff4444; color: #fff; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Error Popup Modal -->
    <div id="error-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000; flex-direction: column; backdrop-filter: blur(3px);">
        <div style="background: #1e1e28; padding: 30px; border-radius: 10px; border: 2px solid #ff4444; text-align: center; width: 350px; box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);">
            <h2 style="color: #ff4444; margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 10px;">⚠️ Invalid Link</h2>
            <p id="error-message-text" style="color: #ffffff; font-size: 1.1rem; margin: 20px 0; line-height: 1.5;"></p>
            <button onclick="closeErrorModal()" style="padding: 10px 25px; background: #ff4444; color: #fff; font-weight: bold; font-size: 1rem; border: none; border-radius: 5px; cursor: pointer; transition: background 0.2s;">Got it</button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 3000; flex-direction: column; backdrop-filter: blur(5px);">
        <div style="background: #1e1e28; padding: 40px; border-radius: 15px; border: 3px solid #00ffcc; text-align: center; width: 400px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);">
            <h1 style="color: #00ffcc; margin-top: 0; font-size: 2.5rem; letter-spacing: 2px;">MISSION ACCOMPLISHED</h1>
            <p id="game-over-reason" style="color: #aaaaaa; font-size: 1.1rem; margin-bottom: 20px;"></p>
            
            <div style="background: #2a2a3a; padding: 20px; border-radius: 8px; margin: 20px 0;">
                <h2 style="color: #fff; margin: 0 0 15px 0;">WINNER</h2>
                <div id="winner-name" style="font-size: 1.8rem; font-weight: bold; color: #ffeb3b; text-transform: uppercase;"></div>
                <div id="winner-score" style="font-size: 1.2rem; color: #00ffcc; margin-top: 10px;"></div>
            </div>

            <button onclick="window.location.href='index.html'" style="padding: 15px 30px; background: #00ffcc; color: #000; font-weight: bold; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; width: 100%; text-transform: uppercase;">Return to HQ</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
