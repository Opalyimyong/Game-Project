<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Web Game Menu</title>
    <link rel="stylesheet" href="mainmenu_Style.css">
    <style>
        .player-inputs {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .player-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .player-input-row input[type="text"] {
            flex: 1;
            padding: 8px;
            background: #2a2a3a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        .player-input-row .color-box {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>ENERGY <span class="NOT">NOT</span> INCLUDED</h1>
        
        <div class="menu-item">
            <label for="player-count">Players: <span id="player-val">3</span></label>
            <button onclick="decrementPlayers()">-</button>
            <button onclick="incrementPlayers()">+</button>
            
            <div id="player-inputs-container" class="player-inputs">
                <!-- Inputs generated by JS -->
            </div>
        </div>
        
        <div class="menu-item">
            <label for="map-select">Select Map</label>
            <select id="map-select">
                <option value="factory">The Rust Factory</option>
            </select>
        </div>

        <button class="start-btn" onclick="startGame()">INITIALIZE MISSION</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
